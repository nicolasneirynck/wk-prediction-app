<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title th:text="#{app.title}"></title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" th:replace="~{fragments/layout :: sidebar('')}"></aside>

  <main class="page">
    <header class="topbar" th:replace="~{fragments/layout :: topbar('Nicolas Neirynck')}"></header>

    <section class="content match-detail-content">
      <a class="back-link" th:href="@{/}">Back to Matches</a>

      <section class="match-detail-card">
        <section class="match-detail-header">
          <p class="match-stage-label" th:text="${matchDTO.matchStage}">Group A</p>

          <div class="match-teams">
            <div class="match-detail-team">
              <span class="match-detail-flag fi" th:classappend="' fi-' + ${matchDTO.homeCountryCode}"></span>
              <p class="match-detail-team-name" th:text="${matchDTO.homeCountry}">Mexico</p>
            </div>

            <div class="match-detail-score">
              <span class="match-detail-score-text"
                    th:if="${matchDTO.finalHomeScore != null and matchDTO.finalAwayScore != null}"
                    th:text="${matchDTO.finalHomeScore + ' - ' + matchDTO.finalAwayScore}">2 - 1
              </span>

              <span class="match-detail-versus-text"
                    th:unless="${matchDTO.finalHomeScore != null and matchDTO.finalAwayScore != null}">VS</span>
            </div>

            <div class="match-detail-team">
              <span class="match-detail-flag fi" th:classappend="' fi-' + ${matchDTO.awayCountryCode}"></span>
              <p class="match-detail-team-name" th:text="${matchDTO.awayCountry}">Canada</p>
            </div>
          </div>
        </section>

        <section class="match-detail-footer">
          <div class="match-detail-meta-strip">
            <div class="match-detail-meta-item">
              <span class="match-detail-meta-label">Date &amp; Time</span>
              <span class="match-detail-meta-value"
                    th:with="df=#{date.format.pattern}, formattedDate=${#temporals.format(matchDTO.matchDateTime, df)}"
                    th:text="${#strings.capitalize(formattedDate)}">Jun 11, 2026 - 20:00</span>
            </div>

            <div class="match-detail-meta-divider"></div>

            <div class="match-detail-meta-item">
              <span class="match-detail-meta-label">Venue</span>
              <span class="match-detail-meta-value" th:text="${matchDTO.stadiumName + ', ' + matchDTO.city + ', ' + matchDTO.hostCountry}">Estadio Azteca, Mexico City, MEXICO</span>
            </div>
          </div>
        </section>
      </section>
    </section>
  </main>
</div>
</body>

</html>
