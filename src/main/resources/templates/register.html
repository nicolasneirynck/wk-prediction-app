<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{register.title}">Register</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <aside class="sidebar" th:replace="~{fragments/layout :: sidebar('register')}"></aside>

    <main class="page">
        <header class="topbar" th:replace="~{fragments/layout :: topbar('')}"></header>

        <section class="content">
            <section class="page-header">
                <h1 class="page-title" th:text="#{register.title}">Register</h1>
                <p class="page-subtitle" th:text="#{register.subtitle}">Create your account and start making World Cup predictions.</p>
            </section>

            <section class="team-form-card">
                <form class="team-form" th:object="${inputRegistrationDTO}" th:action="@{/register}" method="post">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="firstName" th:text="#{register.firstName.label}">First name</label>
                            <input class="form-input" th:field="*{firstName}" id="firstName" type="text" th:placeholder="#{register.firstName.placeholder}">
                            <span th:if="${#fields.hasErrors('firstName')}"
                                  th:errorclass="error" th:errors="*{firstName}"></span>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="lastName" th:text="#{register.lastName.label}">Last name</label>
                            <input class="form-input" th:field="*{lastName}" id="lastName" type="text" th:placeholder="#{register.lastName.placeholder}">
                            <span th:if="${#fields.hasErrors('lastName')}"
                                  th:errorclass="error" th:errors="*{lastName}"></span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="email" th:text="#{register.email.label}">Email</label>
                        <input class="form-input" th:field="*{email}" id="email" type="email" th:placeholder="#{register.email.placeholder}">
                        <span th:if="${#fields.hasErrors('email')}"
                              th:errorclass="error" th:errors="*{email}"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password" th:text="#{register.password.label}">Password</label>
                        <input class="form-input" th:field="*{password}" id="password" type="password" th:placeholder="#{register.password.placeholder}">
                        <span th:if="${#fields.hasErrors('password')}"
                              th:errorclass="error" th:errors="*{password}"></span>
                    </div>
                    <div class="form-actions form-actions-between">
                        <button class="form-button" type="submit" th:text="#{register.submit}">Register</button>
                        <a class="form-secondary-link" th:href="@{/login}" th:text="#{register.login.link}">Already have an account?</a>
                    </div>
                </form>
            </section>
        </section>
    </main>
</div>
</body>
</html>
