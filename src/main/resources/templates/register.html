<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <aside class="sidebar" th:replace="~{fragments/layout :: sidebar('register')}"></aside>

    <main class="page">
        <header class="topbar" th:replace="~{fragments/layout :: topbar('')}"></header>

        <section class="content">
            <section class="page-header">
                <h1 class="page-title">Register</h1>
                <p class="page-subtitle">Create your account and start making World Cup predictions.</p>
            </section>

            <section class="team-form-card">
                <form class="team-form" th:object="${inputRegistrationDTO}" th:action="@{/register}" method="post">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="firstName">First name</label>
                            <input class="form-input" th:field="*{firstName}" id="firstName" type="text" placeholder="Enter your first name">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="lastName">Last name</label>
                            <input class="form-input" th:field="*{lastName}" id="lastName" type="text" placeholder="Enter your last name">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <input class="form-input" th:field="*{email}" id="email" type="email" placeholder="you@example.com">
                        <span th:if="${#fields.hasErrors('email')}"
                              th:errorclass="error" th:errors="*{email}"></span>

                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input class="form-input" th:field="*{password}" id="password" type="password" placeholder="Choose a password">
                    </div>

                    <div class="form-actions form-actions-between">
                        <button class="form-button" type="submit">Register</button>
                        <a class="form-secondary-link" th:href="@{/login}">Already have an account?</a>
                    </div>
                </form>
            </section>
        </section>
    </main>
</div>
</body>
</html>
