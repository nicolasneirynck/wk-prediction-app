<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="#{app.title}"></title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <aside class="sidebar" th:replace="~{fragments/layout :: sidebar('team')}"></aside>

    <main class="page">
        <header class="topbar" th:replace="~{fragments/layout :: topbar('Nicolas Neirynck')}"></header>

        <section class="content">
            <section class="page-header">
                <h1 class="page-title" th:text="${teamDetailDTO.name}"></h1>
                <p class="team-page-subtitle"
                   th:text="${teamDetailDTO.memberCount + ' members • ' + teamTotalScore + ' total points'}">4 members • 31 total points</p>

                <section class="invite-code-card">
                    <div class="invite-code-content">
                        <p class="invite-code-label">Invite Code</p>
                        <p class="team-invite-code" th:text="${teamDetailDTO.inviteCode}">GOAL2026</p>
                    </div>

                    <div class="invite-code-actions">
                        <form th:action="@{/teams/{id}/regenerate-invite-code(id=${teamDetailDTO.id})}" method="post">
                            <button class="invite-code-regenerate-button" type="submit" aria-label="Regenerate invite code">
                                Regenerate
                            </button>
                        </form>
                    </div>
                </section>
            </section>

            <section class="member-section">
                <h2 class="section-title">Team Members</h2>
                <section class="member-list-card">
                    <article class="member-row" th:each="member, rank: ${rankedMembers}">
                        <span class="member-rank" th:text="${rank.count}">1</span>
                        <div class="member-row-main">
                            <div class="member-info">
                                <p class="member-name" th:text="${member.name}">Alice Johnson</p>
                                <div class="member-inline-actions">
                                    <span class="member-owner-badge" th:if="${member.owner}">Owner</span>
                                    <form th:action="@{/teams/{teamId}/members/{memberId}/remove(teamId=${teamDetailDTO.id},memberId=${member.id})}"
                                          th:if="${!member.owner}"
                                          method="post">
                                        <button class="member-remove-button" type="submit">Remove</button>
                                    </form>
                                </div>
                            </div>
                        </div>

                        <span class="member-score-badge" th:text="${member.score + ' pts'}">16 pts</span>
                    </article>
                </section>
            </section>
        </section>
    </main>
</div>
</body>

</html>
